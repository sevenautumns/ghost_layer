name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: targets
        run: echo "matrix=$(make print-targets | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: macos-latest
    strategy:
      matrix:
        target: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lib-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libghostlayer.a

  package:
    runs-on: macos-latest
    needs: [setup, build]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Restore artifact paths
        run: |
          for target in $(make print-targets); do
            mkdir -p target/${target}/release
            cp artifacts/lib-${target}/libghostlayer.a target/${target}/release/libghostlayer.a
          done

      - name: Lipo fat binaries
        run: make lipo

      - name: Install cbindgen
        run: brew install cbindgen

      - name: Generate headers
        run: make bindings

      - name: Build XCFramework
        run: make xcframework

      - name: Run Swift tests
        run: make test

      - name: Zip framework
        run: make zip

      - name: Compute checksum
        id: checksum
        run: echo "value=$(make checksum)" >> "$GITHUB_OUTPUT"

      - name: Update Package.swift and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          REPO="${GITHUB_REPOSITORY}"
          URL="https://github.com/${REPO}/releases/download/${VERSION}/GhostLayer.xcframework.zip"
          CHECKSUM="${{ steps.checksum.outputs.value }}"
          sed -i '' \
            -e "s|url: \".*\"|url: \"${URL}\"|" \
            -e "s|checksum: \".*\"|checksum: \"${CHECKSUM}\"|" \
            Package.swift
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: update Package.swift for ${VERSION}"
          git tag "${VERSION}"
          git push origin HEAD:main "${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: GhostLayer.xcframework.zip
          generate_release_notes: true
